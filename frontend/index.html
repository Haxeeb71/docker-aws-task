<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Docker Groceries App</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
        .login-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #28a745; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        #error-msg { color: red; font-size: 0.9em; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-container" id="loginBox">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Deploy Secure Login</button>
        </form>
        <p id="error-msg"></p>
        <p><small>Hint: admin / password</small></p>
        <p><a href="#" id="toggleSignup">Create an account</a></p>
    </div>

    <div class="login-container" id="signupBox" style="display: none;">
        <h2>Sign Up</h2>
        <form id="signupForm">
            <input type="text" id="regUsername" placeholder="New Username" required>
            <input type="password" id="regPassword" placeholder="New Password" required>
            <button type="submit" style="background-color: #007bff;">Register Account</button>
        </form>
        <p id="signup-msg"></p>
        <p><a href="#" id="toggleLogin">Back to Login</a></p>
    </div>

    <script>
        document.getElementById('toggleSignup').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('signupBox').style.display = 'block';
            document.getElementById('error-msg').innerText = '';
        });

        document.getElementById('toggleLogin').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('signupBox').style.display = 'none';
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('signup-msg').innerText = '';
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                const msgEl = document.getElementById('signup-msg');
                
                if (data.success) {
                    msgEl.style.color = 'green';
                    msgEl.innerText = 'Registration successful! Switch to login.';
                    document.getElementById('regUsername').value = '';
                    document.getElementById('regPassword').value = '';
                } else {
                    msgEl.style.color = 'red';
                    msgEl.innerText = data.message;
                }
            } catch (err) {
                console.error(err);
                document.getElementById('signup-msg').style.color = 'red';
                document.getElementById('signup-msg').innerText = 'Server error occurred.';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                
                if (data.success) {
                    sessionStorage.setItem('loggedIn', 'true');
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('error-msg').innerText = data.message;
                }
            } catch (err) {
                console.error(err);
                document.getElementById('error-msg').innerText = 'Server error occurred.';
            }
        });
    </script>
</body>
</html>
